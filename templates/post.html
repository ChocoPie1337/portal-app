<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ post.title }} - Мой Портал</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        .post-container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .like-section {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .like-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .like-btn:hover {
            transform: scale(1.05);
            background: #5a6fd6;
        }
        .like-count {
            font-size: 1.4rem;
            font-weight: bold;
        }
        #likesDisplay {
            color: #e74c3c;
        }
        .status {
            font-size: 0.8rem;
            color: #888;
            margin-top: 0.5rem;
        }
        .status.connected { color: #27ae60; }
        .status.disconnected { color: #e74c3c; }
    </style>
</head>
<body>

    <nav>
        <a href="{{ url_for('index') }}">Главная</a>
        <a href="{{ url_for('about') }}">О нас</a>
        <a href="{{ url_for('partners') }}">Партнёры</a>
        <a href="{{ url_for('register') }}">Регистрация</a>
        <a href="{{ url_for('contact') }}">Контакты</a>
    </nav>

    <div class="container">
        <div class="post-container">
            <h1>{{ post.title }}</h1>
            <p>{{ post.content }}</p>
            <div class="like-section">
                <button class="like-btn" id="likeBtn">❤️ Лайк</button>
                <span class="like-count">Количество лайков: <span id="likesDisplay">{{ post.likes_count }}</span></span>
            </div>
            <div class="status" id="connectionStatus">⚪ Подключение...</div>
            <p><small>Создан: {{ post.created_at.strftime('%d.%m.%Y %H:%M') }}</small></p>
        </div>
    </div>

    <footer>
        <p>© 2026 Мой Портал | Лайки в реальном времени (WebSocket)</p>
    </footer>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const postId = {{ post.id }};
        const likesDisplay = document.getElementById('likesDisplay');
        const statusEl = document.getElementById('connectionStatus');

        const socket = io();

        socket.on('connect', function() {
            statusEl.textContent = '🟢 Подключено к серверу';
            statusEl.className = 'status connected';
            socket.emit('join_post', { post_id: postId });
        });

        socket.on('disconnect', function() {
            statusEl.textContent = '🔴 Отключено от сервера';
            statusEl.className = 'status disconnected';
        });

        socket.on('like_update', function(data) {
            if (data.post_id === postId) {
                likesDisplay.textContent = data.likes_count;
            }
        });

        document.getElementById('likeBtn').addEventListener('click', function() {
            if (socket.connected) {
                socket.emit('like_post', { post_id: postId });
            } else {
                alert('Нет соединения с сервером');
            }
        });
    </script>
</body>
</html>
