<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ post.title }} - Мой Портал</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        .post-container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .like-section {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .like-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .like-btn:hover {
            transform: scale(1.05);
            background: #5a6fd6;
        }
        .like-count {
            font-size: 1.4rem;
            font-weight: bold;
        }
        #likesDisplay {
            color: #e74c3c;
        }
    </style>
</head>
<body>

    <nav>
        <a href="{{ url_for('index') }}">Главная</a>
        <a href="{{ url_for('about') }}">О нас</a>
        <a href="{{ url_for('partners') }}">Партнёры</a>
        <a href="{{ url_for('register') }}">Регистрация</a>
        <a href="{{ url_for('contact') }}">Контакты</a>
    </nav>

    <div class="container">
        <div class="post-container">
            <h1>{{ post.title }}</h1>
            <p>{{ post.content }}</p>
            <div class="like-section">
                <button class="like-btn" id="likeBtn">❤️ Лайк</button>
                <span class="like-count">Количество лайков: <span id="likesDisplay">{{ post.likes_count }}</span></span>
            </div>
            <p><small>Создан: {{ post.created_at.strftime('%d.%m.%Y %H:%M') }}</small></p>
        </div>
    </div>

    <footer>
        <p>© 2026 Мой Портал | Лайки в реальном времени</p>
    </footer>

    <script>
        const postId = {{ post.id }};
        const likesDisplay = document.getElementById('likesDisplay');

        // 1. Подключаемся к SSE-потоку
        const eventSource = new EventSource('/stream');

        eventSource.onmessage = function(event) {
            const data = JSON.parse(event.data);
            // Если обновление относится к текущему посту – обновляем счётчик
            if (data.post_id === postId) {
                likesDisplay.textContent = data.likes_count;
            }
        };

        eventSource.onerror = function() {
            console.warn('SSE connection error, reconnecting...');
            // EventSource автоматически переподключается
        };

        // 2. Обработчик клика по кнопке лайка
        document.getElementById('likeBtn').addEventListener('click', async function() {
            try {
                const response = await fetch('/api/like/' + postId, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                const result = await response.json();
                if (result.success) {
                    // Обновляем локально (на случай, если SSE немного задержится)
                    likesDisplay.textContent = result.likes_count;
                } else {
                    alert('Ошибка при лайке');
                }
            } catch (error) {
                console.error('Ошибка:', error);
            }
        });
    </script>
</body>
</html>
